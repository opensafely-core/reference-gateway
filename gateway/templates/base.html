<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenSAFELY Gateway</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-body-tertiary min-vh-100 d-flex flex-column">
    <nav class="navbar navbar-expand-lg bg-body shadow-sm">
      <div class="container d-flex align-items-center justify-content-between gap-3">
        <a class="navbar-brand mb-0 h1" href="#">
          OpenSAFELY Gateway
        </a>
        <div class="d-flex align-items-center gap-3 ms-auto">
          {% if request.user.is_authenticated %}
            <a class="btn btn-outline-primary" href="{% url 'airlock-token' %}">Airlock token</a>
            <p class="text-muted small mb-0">
              Signed in as <strong>{{ request.user.display_name }}</strong>
            </p>
            <form method="post" action="{% url 'logout' %}">
              {% csrf_token %}
              <button type="submit" class="btn btn-outline-danger">Log out</button>
            </form>
          {% else %}
            <a class="btn btn-outline-primary" href="{% url 'login' %}">Log in</a>
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="container py-5 flex-grow-1">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
